<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residential Signage</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Sora:wght@500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #43a047 0%, #1b5e20 100%);
            --sidebar-gradient: linear-gradient(to bottom, #ffffff 0%, #f1f8e9 100%);
            --accent-color: #f39c12;
            --text-main: #1b5e20;
            --text-sub: #555;
            --shadow-card: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-header: 0 4px 10px rgba(0, 0, 0, 0.2);
            --surface-1: #f4f6f2;
            --surface-2: #ffffff;
            --line-soft: rgba(0, 0, 0, 0.06);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }

        body {
            min-height: 100vh;
            display: grid;
            grid-template-areas:
                "header header"
                "content sidebar";
            grid-template-columns: 1fr 360px;
            /* Leaner sidebar for focus */
            grid-template-rows: 72px 1fr;
            /* Slim header for premium feel */
            background: linear-gradient(180deg, #f7f9f6 0%, #edf1eb 100%);
        }

        /* --- Header --- */
        header {
            grid-area: header;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 32px;
            box-shadow: var(--shadow-header);
            z-index: 20;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header-title {
            letter-spacing: 0.1em;
        }

        .header-subtitle {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.25em;
            opacity: 0.85;
            margin-left: 14px;
            text-transform: uppercase;
        }

        .company-logo {
            height: 40px;
            width: auto;
            margin-left: auto;
            /* Push to the right */
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        /* --- Main Content Area --- */
        #content-area {
            grid-area: content;
            position: relative;
            background-color: #000;
            overflow: hidden;
            min-height: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .slide.active {
            display: block;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(1.02);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* --- Sidebar --- */
        aside {
            grid-area: sidebar;
            background: var(--surface-1);
            padding: 24px 22px 26px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -8px 0 20px rgba(0, 0, 0, 0.05);
            z-index: 10;
            min-height: 0;
        }

        /* Glass / Card Effect for Widgets */
        .widget {
            background: var(--surface-2);
            border-radius: 14px;
            padding: 20px 20px 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--line-soft);
            transition: transform 0.3s ease;
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .widget-title {
            font-size: 11px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #8a948f;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .widget-title::after {
            content: "";
            display: block;
            height: 1px;
            background: rgba(0, 0, 0, 0.05);
            margin-top: 10px;
        }

        /* Widget: Date & Time */
        .widget-time {
            text-align: center;
            background: linear-gradient(160deg, #f1f8e9 0%, #ffffff 100%);
        }

        .time-display {
            font-size: 66px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 1);
            font-family: 'Sora', 'Noto Sans JP', sans-serif;
        }

        .date-display {
            font-size: 22px;
            color: var(--text-sub);
            font-weight: 400;
            letter-spacing: 0.08em;
            margin-bottom: 2px;
        }

        /* Widget: Weather */
        .widget-weather {
            text-align: center;
            flex: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .weather-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 6px;
        }

        .weather-icon {
            font-size: 72px;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.1));
        }

        .weather-info {
            text-align: left;
        }

        .weather-temp {
            font-size: 48px;
            font-weight: bold;
            color: var(--text-main);
            line-height: 1;
        }

        .weather-desc {
            font-size: 18px;
            color: var(--text-sub);
        }

        /* Widget: Emergency / Contact */
        .widget-contact {
            background: linear-gradient(135deg, #fff3e0 0%, #ffffff 100%);
            text-align: center;
            margin-top: auto;
            /* Push to bottom */
            border-left: 5px solid var(--accent-color);
        }

        .contact-title {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .contact-number {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            display: block;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            letter-spacing: 0.05em;
        }

        /* Widget: QR Code */
        .widget-qr {
            text-align: center;
            background: var(--surface-2);
            padding: 15px;
            flex-grow: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-image {
            width: 80px;
            height: 80px;
            margin: 5px 0;
            opacity: 0.8;
        }

        .qr-label {
            font-size: 10px;
            color: var(--text-sub);
            letter-spacing: 0.1em;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <span class="header-title">レジェンド相模原富士見</span>
            <span class="header-subtitle">RESIDENTIAL SIGNAGE</span>
        </div>
        <img src="../assets/company_logo.png" alt="Company Logo" class="company-logo">
    </header>
    <div id="content-area">
        <!-- Slides will be injected here -->
    </div>
    <aside>
        <div class="widget widget-time">
            <div class="widget-title">現在時刻</div>
            <div class="time-display" id="clock">12:00</div>
            <div class="date-display" id="date">1月1日 (月)</div>
        </div>
        <div class="widget widget-weather" id="weather-widget">
            <div class="widget-title">天気</div>
            <div class="weather-container">
                <span class="weather-icon">☀</span>
                <div class="weather-info">
                    <div class="weather-temp">--°C</div>
                    <div class="weather-desc">Loading...</div>
                </div>
            </div>
        </div>
        <div class="widget widget-qr">
            <div class="widget-title">WEB SITE</div>
            <img src="../assets/qr_code.svg" alt="QR Code" class="qr-image">
            <div class="qr-label">管理会社HP</div>
        </div>

    </aside>
    <!-- Load Playlist -->
    <script src="playlist.js"></script>
    <script>
        /* --- 0. Config Loading Logic --- */
        let weatherLat = 35.5714; // Default: Sagamihara
        let weatherLon = 139.3730;
        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                if (!response.ok) throw new Error("Config not found");
                const config = await response.json();
                // Apply Header Config
                if (config.header) {
                    if (config.header.title) document.querySelector('.header-title').textContent = config.header.title;
                    if (config.header.subtitle) document.querySelector('.header-subtitle').textContent = config.header.subtitle;
                }
                // Apply Weather Config
                if (config.weather) {
                    if (config.weather.lat) weatherLat = config.weather.lat;
                    if (config.weather.lon) weatherLon = config.weather.lon;
                }
                // Apply Contact Config
                if (config.contact) {
                    if (config.contact.title) document.querySelector('.contact-title').textContent = config.contact.title;
                    if (config.contact.number) document.querySelector('.contact-number').textContent = config.contact.number;
                }
                // Apply QR Config
                if (config.qr) {
                    if (config.qr.label) document.querySelector('.qr-label').textContent = config.qr.label;
                }
                console.log("Config loaded successfully.");
            } catch (e) {
                console.warn("Using default config (config.json not found or invalid).", e);
            }
        }
        /* --- 1. Clock Logic --- */
        function updateClock() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            // Time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            // Date
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const day = days[now.getDay()];
            document.getElementById('date').textContent = `${month}月${date}日 (${day})`;
        }
        setInterval(updateClock, 1000);
        updateClock();
        /* --- 2. Weather Logic (Open-Meteo Free API) --- */
        async function fetchWeather() {
            // Use dynamic lat/lon from config
            const lat = weatherLat;
            const lon = weatherLon;
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lon}&longitude=${lat}&current_weather=true&daily=weathercode&timezone=Asia%2FTokyo`); // Wait, user code had lat/lon swapped in URL params? 
                // Creating correct URL: latitude=${lat}&longitude=${lon}
                // Checking previous code: `latitude=${lon}&longitude=${lat}` ws used in user snippet. This is BUG in user snippet (lon is ~139, lat ~35).
                // OpenMeteo expects latitude (-90 to 90). 139 is invalid latitude.
                // I must correct this.
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode&timezone=Asia%2FTokyo`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (!data.current_weather) throw new Error("No weather data");
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                // Simple WMO code mapping
                let icon = '☁';
                let desc = '曇り';
                if (code <= 1) { icon = '☀'; desc = '晴れ'; }
                else if (code <= 3) { icon = '⛅'; desc = '曇り'; }
                else if (code <= 48) { icon = '🌫'; desc = '霧'; }
                else if (code <= 67) { icon = '☔'; desc = '雨'; }
                else if (code <= 77) { icon = '☃'; desc = '雪'; }
                else if (code <= 82) { icon = '☔'; desc = '大雨'; }
                else { icon = '☂'; desc = '雨'; }
                document.querySelector('.weather-temp').textContent = `${temp}°C`;
                document.querySelector('.weather-icon').textContent = icon;
                document.querySelector('.weather-desc').textContent = desc;
            } catch (e) {
                console.error("Weather fetch failed:", e);
                document.querySelector('.weather-desc').textContent = "取得失敗";
            }
        }
        /* --- 3. Slideshow Logic --- */
        const IMAGE_DURATION = 10000;
        const ASSETS_DIR = "../assets/";
        const container = document.getElementById('content-area');
        let currentIndex = 0;
        let timer = null;
        function initPlayer() {
            if (typeof playlist === 'undefined' || playlist.length === 0) {
                container.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40%;">No Content</h1>';
                setTimeout(() => location.reload(), 5000);
                return;
            }
            playNext();
        }
        function playNext() {
            container.innerHTML = '';
            clearTimeout(timer);
            if (currentIndex >= playlist.length) {
                currentIndex = 0;
            }
            const filename = playlist[currentIndex];
            const ext = filename.split('.').pop().toLowerCase();
            let element;
            if (['mp4', 'webm'].includes(ext)) {
                element = document.createElement('video');
                element.src = ASSETS_DIR + filename;
                element.muted = true;
                element.autoplay = true;
                element.className = 'slide active';
                element.onended = () => {
                    currentIndex++;
                    playNext();
                };
                element.onerror = () => {
                    console.error("Error loading video:", filename);
                    currentIndex++;
                    playNext();
                };
            } else if (ext === 'pdf') {
                element = document.createElement('iframe');
                element.src = ASSETS_DIR + filename + "#toolbar=0&navpanes=0&scrollbar=0&view=Fit";
                element.className = 'slide active';
                element.style.border = 'none';
                timer = setTimeout(() => {
                    currentIndex++;
                    playNext();
                }, 15000);
            } else {
                element = document.createElement('img');
                element.src = ASSETS_DIR + filename;
                element.className = 'slide active';
                element.onload = () => {
                    timer = setTimeout(() => {
                        currentIndex++;
                        playNext();
                    }, IMAGE_DURATION);
                };
                element.onerror = () => {
                    console.error("Error loading image:", filename);
                    currentIndex++;
                    playNext();
                };
            }
            container.appendChild(element);
        }
        // Start Sequence
        // 1. Load Config
        // 2. Then Start Weather Fetch (using updated lat/lon)
        // 3. Start Player
        loadConfig().then(() => {
            fetchWeather();
            setInterval(fetchWeather, 1800000); // Update every 30 mins
            initPlayer();
        });
    </script>
</body>

</html>
